<style>
    /* Fondo general de la página con tu verde Pantone Greenish suave */
    body {
        background-color: #e2ede6 !important; 
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Modificación de la barra superior (Header) a tono rosado estético */
    header, .header-guia, [class*="header"] { 
        background: #ff8da1 !important; /* El mismo rosado del botón */
        box-shadow: 0 4px 12px rgba(255, 141, 161, 0.2) !important;
    }

    /* Asegurar que las letras del encabezado se vean blancas y resalten */
    header h1, header h2, .header-guia h1, [class*="header"] h1 {
        color: #ffffff !important;
    }

    /* Tarjetas de contenido refinadas con bordes suaves */
    .tarjeta-video {
        background: #ffffff !important;
        border-radius: 16px !important;
        padding: 24px !important;
        border: 1px solid rgba(255, 141, 161, 0.15) !important;
        box-shadow: 0 6px 18px rgba(203, 220, 208, 0.5) !important;
        margin-bottom: 25px !important;
        display: flex;
        flex-direction: column;
    }

    /* Títulos de las guías en un verde bosque muy oscuro y elegante */
    .tarjeta-video h3, .tarjeta-video h2 {
        color: #1e3526 !important;
        margin-top: 0 !important;
        font-size: 19px !important;
        border-bottom: 2px solid #eff6f2 !important;
        padding-bottom: 8px !important;
        font-weight: 600;
    }

    /* Texto de las descripciones */
    .tarjeta-video p {
        color: #4a554e !important;
        line-height: 1.6 !important;
        font-size: 15px !important;
    }
</style>

<main class="lista-contenidos">
    {% for elemento in contenidos %}
        <div class="tarjeta-video">
            <h3>{{ elemento.titulo }}</h3>
            <p>{{ elemento.descripcion }}</p>

            <div class="enlace-video-contenedor" style="margin-top: 15px;">
                {% if elemento.video_url %}
                    <div style="background-color: #effbf3; padding: 12px 16px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #c7eed4;">
                        <span style="font-size: 13px; color: #3d7a5a; font-weight: 600; font-family: sans-serif;">
                            🟢 Material de Apoyo:
                        </span>
                        <a href="{{ elemento.video_url }}" target="_blank" style="background: #ff8da1; color: white; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: bold; text-decoration: none; box-shadow: 0 4px 10px rgba(255, 141, 161, 0.3); display: inline-block; font-family: sans-serif;">
                            Ver video explicativo ✨
                        </a>
                    </div>
                {% else %}
                    <div style="background: #fafafa; padding: 12px 16px; border-radius: 12px; text-align: center; border: 1px dashed #e0e0e0;">
                        <span style="font-size: 13px; color: #9e9e9e; font-style: italic; font-family: sans-serif;">
                            No hay video asignado todavía.
                        </span>
                    </div>
                {% endif %}
            </div>
        </div>
    {% empty %}
        <p class="sin-contenido" style="color: #4a554e; text-align: center; font-style: italic;">Por los momentos no se han subido guías.</p>
    {% endfor %}
</main>

</body>
</html>
